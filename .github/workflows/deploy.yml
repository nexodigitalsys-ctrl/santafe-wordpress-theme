name: 🚀 Deploy para Hostinger

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR || '/public_html/wp-content/themes/santafe-wordpress-theme-main/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/audit-screenshots/**
            **/*.png
            **/*.jpg
            **/*.zip
            **/.env*
            README.md
            .github/**
            docs/**
            test-email.php
