name: Deploy Santa Fe Theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🚀 Despliegue vía SFTP/SSH
        uses: easingthemes/ssh-deploy@main
        with:
          # Usamos "with" en lugar de solo "env" para algunas versiones de esta acción
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote-host: ${{ secrets.SSH_HOST }}
          remote-user: ${{ secrets.SSH_USER }}
          remote-port: 65002
          target: "/home/u526996563/domains/chatopsmaster.com/public_html/wp-content/themes/santafe-wordpress-theme/"
          source: "/"
          args: "-rlgoDzvc -i --delete"
          exclude: "/.github/, /.git/, /node_modules/, .gitignore, README.md"