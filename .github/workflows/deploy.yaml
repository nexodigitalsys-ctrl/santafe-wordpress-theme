name: Deploy Santa Fe Theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🚀 Despliegue vía SFTP/SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: 65002
          # Ruta relativa más segura
          TARGET: "domains/santafe.nexo-digital.app/public_html/wp-content/themes/santafe-wordpress-theme/"
          SOURCE: "/"
          ARGS: "-rlgoDzvc -i --delete"
          EXCLUDE: "/.github/, /.git/, /node_modules/, .gitignore, README.md"