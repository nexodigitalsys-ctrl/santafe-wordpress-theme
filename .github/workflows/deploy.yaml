name: Deploy Santa Fe Theme to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout del código
        uses: actions/checkout@v3

      - name: 🚀 Despliegue vía SFTP/SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: 65002  # <--- LO HEMOS PUESTO DIRECTO AQUÍ PARA EVITAR FALLOS
          TARGET: "/home/u526996563/domains/chatopsmaster.com/public_html/wp-content/themes/santafe-wordpress-theme/"
          SOURCE: "/"
          EXCLUDE: "/.github/, /.git/, /node_modules/, .gitignore, README.md"